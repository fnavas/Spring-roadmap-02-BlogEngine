spring:
  datasource:
    url: jdbc:mysql://localhost:3307/blogenginedb?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: blogengine
    password: blogengine
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
